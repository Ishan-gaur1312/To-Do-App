<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced To-Do App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>My To-Do List</h1>

    <!-- Dark Mode Button -->
    <button class="dark-btn" onclick="toggleDarkMode()">🌙 Dark Mode</button>

    <div class="input-box">
      <input type="text" id="taskInput" placeholder="Enter your task">

      <!-- Reminder -->
      <input type="datetime-local" id="reminderTime">

      <!-- Category -->
      <select id="category">
        <option value="Work">Work</option>
        <option value="Study">Study</option>
        <option value="Personal">Personal</option>
      </select>

      <!-- Priority -->
      <select id="priority">
        <option value="High">High Priority</option>
        <option value="Medium">Medium Priority</option>
        <option value="Low">Low Priority</option>
      </select>

      <button onclick="addTask()">Add</button>
    </div>

    <!-- Search Box -->
    <input type="text" id="searchInput" placeholder="Search task..." onkeyup="searchTask()">

    <!-- Filter -->
    <div class="filter-box">
      <button onclick="filterTasks('all')">All</button>
      <button onclick="filterTasks('completed')">Completed</button>
      <button onclick="filterTasks('pending')">Pending</button>
    </div>

    <!-- Clear All -->
    <button class="clear-btn" onclick="clearAllTasks()">Clear All</button>

    <ul id="taskList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
